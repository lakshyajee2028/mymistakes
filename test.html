<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mistakes - Test Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 60%, #2e1065 100%);
            color: #f8fafc; min-height: 100vh; padding: 20px; padding-bottom: 100px;
            overflow-x: hidden;
        }

        .container { max-width: 900px; margin: 0 auto; }
        
        /* Header styling with entry animation */
        .page-header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
            animation: fadeInDown 0.5s ease-out;
        }
        .back-btn { 
            text-decoration: none; color: #38bdf8; font-weight: 600; background: rgba(255,255,255,0.06); 
            padding: 10px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            font-size: 0.9rem; transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(56, 189, 248, 0.15); border-color: #38bdf8; transform: translateX(-3px); }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(45deg, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Subject Tabs & Smooth Scaling */
        .subject-tabs { display: flex; gap: 10px; margin-bottom: 20px; animation: fadeIn 0.6s ease-out; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: 700; 
            flex: 1; text-align: center; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.9rem; letter-spacing: 0.5px;
        }
        .tab-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateY(-2px); }
        .tab-btn.active { 
            background: linear-gradient(135deg, #38bdf8, #2563eb); border-color: transparent; 
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.35); color: #fff; transform: scale(1.02);
        }

        .chapter-section-header { margin-top: 20px; margin-bottom: 12px; color: #38bdf8; font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .chapters-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; padding: 5px 0; }
        
        /* Test Slots Buttons and Badges */
        .ch-btn-wrapper { position: relative; display: inline-block; animation: scaleUp 0.3s ease-out; }
        .ch-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 0.88rem; 
            transition: all 0.25s ease; display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center; font-weight: 600;
        }
        .ch-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .ch-btn span.t-date { font-size: 0.72rem; color: #94a3b8; font-weight: 500; }
        .ch-btn.active { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; border-color: transparent; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .ch-btn.active span.t-date { color: #f1f5f9; }

        /* Dropdown Menu Animations */
        .ch-dropdown-menu { 
            display: none; position: absolute; top: 100%; left: 0; margin-top: 8px; background: #1e1b4b; 
            border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            z-index: 150; width: 135px; overflow: hidden; animation: slideIn 0.2s ease-out;
        }
        .ch-dropdown-menu button { width: 100%; background: none; border: none; color: #cbd5e1; padding: 10px 14px; text-align: left; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .ch-dropdown-menu button:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .ch-dropdown-menu button.del-action { color: #f43f5e; }

        /* Clean Upload Card */
        .upload-section { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 24px; padding: 30px; margin-bottom: 35px; text-align: center; 
            backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out;
        }
        .upload-section p { font-size: 1rem; color: #94a3b8; margin-bottom: 5px; }
        .upload-btn-wrapper { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px;}
        .action-btn { padding: 14px 28px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 0.9rem; }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .camera-btn { background: linear-gradient(45deg, #f97316, #ea580c); color: white; }
        .file-btn { background: linear-gradient(45deg, #10b981, #059669); color: white; }
        .text-btn { background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; }
        input[type="file"] { display: none; }

        /* Floating Actions Button */
        .floating-add-btn {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; border: none; font-size: 2rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 25px rgba(6, 182, 212, 0.5); transition: all 0.3s ease; z-index: 999;
        }
        .floating-add-btn:hover { transform: scale(1.15) rotate(90deg); }

        /* Question Grid View and Display Header */
        .results-container-block { display: none; margin-top: 10px; animation: fadeIn 0.4s ease-out; }
        .viewing-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 4px solid #a855f7; padding-left: 12px; }
        .exit-view-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; }
        .exit-view-btn:hover { background: rgba(255,255,255,0.15); }
        
        /* Redesigned Premium Cards for Questions */
        .mistakes-row-list { display: flex; flex-direction: column; gap: 15px; }
        .mistake-card-row { 
            background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 20px; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .mistake-card-row:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); background: rgba(30, 41, 59, 0.6); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .mistake-card-row.pinned { border-color: #eab308; background: linear-gradient(to bottom right, rgba(234, 179, 8, 0.05), rgba(30, 41, 59, 0.4)); box-shadow: 0 4px 15px rgba(234, 179, 8, 0.1); }
        
        .mistake-meta { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; padding-right: 35px; }
        .mistake-index { font-size: 0.95rem; font-weight: 700; color: #38bdf8; white-space: nowrap; }
        .mistake-caption { font-size: 0.9rem; color: #f1f5f9; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .mistake-date { font-size: 0.75rem; color: #94a3b8; white-space: nowrap; }
        
        .img-container-box { width: 100%; height: 220px; overflow: hidden; border-radius: 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.2s; }
        .img-container-box:hover { opacity: 0.9; }
        .mistake-card-row img { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Premium Text Containers Styles */
        .text-question-container { width: 100%; background: #0f172a; border-radius: 12px; padding: 14px; font-size: 0.92rem; line-height: 1.5; color: #e2e8f0; border: 1px solid rgba(255,255,255,0.08); word-break: break-word; font-weight: 500; }
        .sol-toggle-btn { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.25); color: #38bdf8; padding: 6px 14px; border-radius: 8px; font-size: 0.78rem; cursor: pointer; font-weight: 700; width: max-content; align-self: flex-start; margin-top: 4px; transition: all 0.2s; }
        .sol-toggle-btn:hover { background: rgba(56, 189, 248, 0.2); color: #fff; }
        .text-solution-box { display: none; background: #022c22; border-radius: 10px; padding: 12px; font-size: 0.88rem; line-height: 1.4; color: #6ee7b7; border-left: 4px solid #10b981; margin-top: 6px; word-break: break-word; animation: slideDown 0.25s ease-out; }

        .menu-action-trigger { position: absolute; top: 12px; right: 12px; color: #94a3b8; background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 2px 6px; z-index: 10; transition: color 0.2s; }
        .menu-action-trigger:hover { color: #fff; }
        
        .dropdown-menu-list { 
            display: none; position: absolute; top: 38px; right: 12px; background: #1e1b4b; 
            border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            z-index: 100; width: 130px; overflow: hidden; animation: slideIn 0.2s ease-out;
        }
        .dropdown-menu-list button { width: 100%; background: none; border: none; color: #cbd5e1; padding: 10px 14px; text-align: left; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .dropdown-menu-list button:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .dropdown-menu-list button.del-action { color: #f43f5e; }

        /* Fullscreen Lightbox Modification */
        .lightbox-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.98); z-index: 2000; align-items: center; justify-content: center; animation: fadeIn 0.25s ease-out; }
        .lightbox-modal img { max-width: 95%; max-height: 88vh; object-fit: contain; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2rem; cursor: pointer; background: rgba(255,255,255,0.1); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .lightbox-close:hover { background: rgba(255,255,255,0.2); }

        /* Fluid Animated Custom Popup Modals */
        .app-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            z-index: 3000; align-items: center; justify-content: center; padding: 20px;
            animation: fadeIn 0.3s ease-out;
        }
        .app-modal-card {
            background: #1e1b4b; border: 1px solid rgba(255,255,255,0.15);
            width: 100%; max-width: 440px; border-radius: 24px; padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .app-modal-card h4 { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; color: #38bdf8; }
        .app-modal-card p { font-size: 0.92rem; color: #cbd5e1; margin-bottom: 16px; line-height: 1.4; }
        .app-modal-input {
            width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 0.95rem; outline: none; margin-bottom: 14px; transition: border-color 0.2s;
        }
        .app-modal-input:focus { border-color: #a855f7; }
        .app-modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 10px; }
        
        #camera-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; gap: 25px; }
        #video { width: 90%; max-width: 500px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }

        /* Core UI Keyframe Animations Library */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { height: 0; opacity: 0; overflow: hidden; } to { height: auto; opacity: 1; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
</head>
<body>

<div class="container">
    <div class="page-header">
        <a href="index.html" class="back-btn">⬅ Home</a>
        <h1 id="page-title">TEST SECTION</h1>
    </div>

    <div class="subject-tabs">
        <button class="tab-btn active" onclick="switchSubject('PHYSICS')">PHYSICS</button>
        <button class="tab-btn" onclick="switchSubject('CHEMISTRY')">CHEMISTRY</button>
        <button class="tab-btn" onclick="switchSubject('MATHS')">MATHS</button>
    </div>

    <div class="chapter-section-header"><span>📊 Tests logged:</span><span style="font-size: 0.78rem; color:#94a3b8; font-weight: normal; margin-left: 5px;">(Long-press or Right-click to Edit Slot)</span></div>
    <div class="chapters-container" id="chapters-list-wrapper"></div>

    <div class="upload-section" id="upload-panel-box">
        <p>Active Destination Directory Slot:</p>
        <p><b id="current-loc" style="color:#38bdf8; text-transform: uppercase; font-size: 1.1rem; font-weight: 700;">TEST > PHYSICS</b></p>
        <div class="upload-btn-wrapper">
            <button class="action-btn camera-btn" onclick="openCamera()">📸 Open Camera</button>
            <button class="action-btn file-btn" onclick="document.getElementById('file-input').click()">📁 Upload PDF/Photo</button>
            <button class="action-btn text-btn" onclick="handleTextInputWorkflow()">✍️ Add Text Qn</button>
            <input type="file" id="file-input" accept="image/*,application/pdf" onchange="handleFileUpload(event)">
        </div>
    </div>

    <div class="results-container-block" id="results-display-area">
        <div class="viewing-header">
            <h3>Questions for: <span id="active-target-chapter" style="color: #a855f7;">None</span></h3>
            <button class="exit-view-btn" onclick="resetToUploadMode()">Back to Uploads ⬆</button>
        </div>
        <div class="mistakes-row-list" id="mistakes-container"></div>
    </div>
</div>

<button class="floating-add-btn" onclick="triggerTestCreationModal()" title="Add New Test">+</button>

<div class="app-modal-overlay" id="custom-app-modal">
    <div class="app-modal-card">
        <h4 id="modal-title">Title</h4>
        <p id="modal-desc">Description</p>
        <input type="text" class="app-modal-input" id="modal-input-field-1">
        <input type="text" class="app-modal-input" id="modal-input-field-2">
        <div class="app-modal-actions" id="modal-actions-box"></div>
    </div>
</div>

<div class="lightbox-modal" id="lightbox" onclick="closeFullscreen()">
    <button class="lightbox-close">&times;</button>
    <img id="lightbox-img" src="">
</div>

<div id="camera-modal">
    <video id="video" autoplay playsinline></video>
    <div style="display: flex; gap: 20px;">
        <button class="action-btn file-btn" onclick="captureSnapshot()">⚡ Click Photo</button>
        <button class="action-btn camera-btn" onclick="closeCamera()" style="background: #ef4444;">Cancel</button>
    </div>
</div>

<script>
    const CURRENT_MAIN_PAGE = 'TEST'; 
    let currentSubjectTab = 'PHYSICS';
    let currentSelectedChapter = 'NONE'; 
    let db = null;
    let streamRef = null;

    const getChaptersKey = () => `ch_${CURRENT_MAIN_PAGE}_${currentSubjectTab}`;

    const dbRequest = indexedDB.open("MyMistakesDB", 1);
    dbRequest.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("mistakes")) {
            db.createObjectStore("mistakes", { keyPath: "id", autoIncrement: true });
        }
    };
    dbRequest.onsuccess = function(e) {
        db = e.target.result;
        loadChaptersList();
        
        document.addEventListener('click', function(event) {
            if (!event.target.classList.contains('menu-action-trigger')) {
                document.querySelectorAll('.dropdown-menu-list').forEach(m => m.style.display = 'none');
            }
            if (!event.target.closest('.ch-btn')) {
                document.querySelectorAll('.ch-dropdown-menu').forEach(m => m.style.display = 'none');
            }
        });
    };

    function showCustomModal({ title, desc, numInputs, val1, placeholder1, val2, placeholder2, confirmClass, confirmText, onConfirm }) {
        const overlay = document.getElementById('custom-app-modal');
        const inp1 = document.getElementById('modal-input-field-1');
        const inp2 = document.getElementById('modal-input-field-2');
        const actions = document.getElementById('modal-actions-box');

        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc || '';
        
        inp1.style.display = (numInputs >= 1) ? 'block' : 'none';
        if(numInputs >= 1) { inp1.value = val1 || ''; inp1.placeholder = placeholder1 || ''; }

        inp2.style.display = (numInputs >= 2) ? 'block' : 'none';
        if(numInputs >= 2) { inp2.value = val2 || ''; inp2.placeholder = placeholder2 || ''; }

        actions.innerHTML = `
            <button class="modal-btn modal-btn-cancel" onclick="hideCustomModal()">Cancel</button>
            <button class="modal-btn ${confirmClass || 'modal-btn-primary'}" id="modal-confirm-trigger-btn">${confirmText || 'Confirm'}</button>
        `;

        document.getElementById('modal-confirm-trigger-btn').onclick = function() {
            const out1 = inp1.value.trim();
            const out2 = inp2.value.trim();
            hideCustomModal();
            if (onConfirm) onConfirm(out1, out2);
        };

        overlay.style.display = 'flex';
        if(numInputs >= 1) setTimeout(() => inp1.focus(), 50);
    }

    function hideCustomModal() { document.getElementById('custom-app-modal').style.display = 'none'; }

    function loadChaptersList() {
        const wrapper = document.getElementById('chapters-list-wrapper');
        let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
        if(tests.length === 0) {
            wrapper.innerHTML = `<p style="color: #94a3b8; font-size: 0.88rem; width:100%; padding: 10px 5px;">No active registration configurations logged. Register targets via '+' below.</p>`;
            return;
        }
        
        wrapper.innerHTML = '';
        tests.forEach((tObj, idx) => {
            const block = document.createElement('div');
            block.className = 'ch-btn-wrapper';
            block.innerHTML = `
                <button class="ch-btn ${currentSelectedChapter === tObj.name ? 'active' : ''}" id="ch-trigger-${idx}">
                        ${tObj.name}
                        <span class="t-date">${tObj.date || 'No Date'}</span>
                </button>
                <div class="ch-dropdown-menu" id="ch-menu-${idx}">
                    <button onclick="triggerRenameTest(${idx})">✏️ Rename</button>
                    <button class="del-action" onclick="triggerDeleteTest(${idx})">🗑️ Delete</button>
                </div>
            `;
            wrapper.appendChild(block);

            const btn = document.getElementById(`ch-trigger-${idx}`);
            let holdTimer = null;

            const triggerMenuAction = (e) => {
                e.preventDefault(); e.stopPropagation();
                document.querySelectorAll('.ch-dropdown-menu').forEach(m => m.style.display = 'none');
                document.getElementById(`ch-menu-${idx}`).style.display = 'block';
            };

            btn.addEventListener('contextmenu', triggerMenuAction);
            btn.addEventListener('touchstart', (e) => { holdTimer = setTimeout(() => { triggerMenuAction(e); holdTimer = null; }, 600); }, { passive: true });
            btn.addEventListener('touchend', () => { if (holdTimer) { clearTimeout(holdTimer); selectAndViewChapter(tObj.name); } });
            btn.addEventListener('touchmove', () => { if (holdTimer) clearTimeout(holdTimer); });
            btn.addEventListener('click', () => {
                if (document.getElementById(`ch-menu-${idx}`).style.display !== 'block') selectAndViewChapter(tObj.name);
            });
        });
    }

    function triggerTestCreationModal() {
        showCustomModal({
            title: "Register New Test Slot",
            desc: "Provide distinct Tracking Name and Date values:",
            numInputs: 2,
            placeholder1: "e.g., AIOTS-01, Part Test 3",
            placeholder2: "e.g., 24/05/2026, Today",
            onConfirm: function(tName, tDate) {
                if (!tName) return;
                let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
                if (!tests.some(t => t.name.toLowerCase() === tName.toLowerCase())) {
                    tests.push({ name: tName, date: tDate || 'No Date' });
                    localStorage.setItem(getChaptersKey(), JSON.stringify(tests));
                    loadChaptersList();
                } else {
                    alert("A test with this title already exists!");
                }
            }
        });
    }

    function triggerRenameTest(index) {
        let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
        const oldObj = tests[index];

        showCustomModal({
            title: "Modify Test Parameters",
            desc: "Edit target Name and scheduling Date tags:",
            numInputs: 2,
            val1: oldObj.name, placeholder1: "Test Name",
            val2: oldObj.date, placeholder2: "Test Date",
            onConfirm: function(newName, newDate) {
                if (!newName) return;
                const oldName = oldObj.name;
                tests[index] = { name: newName, date: newDate || 'No Date' };
                localStorage.setItem(getChaptersKey(), JSON.stringify(tests));

                const transaction = db.transaction(["mistakes"], "readwrite");
                const store = transaction.objectStore("mistakes");
                store.getAll().onsuccess = function(e) {
                    e.target.result.forEach(item => {
                        if (item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === oldName) {
                            item.chapterName = newName;
                            store.put(item);
                        }
                    });
                };
                
                transaction.oncomplete = function() {
                    if (currentSelectedChapter === oldName) {
                        currentSelectedChapter = newName;
                        document.getElementById('active-target-chapter').innerText = newName;
                    }
                    loadChaptersList();
                    renderMistakes();
                };
            }
        });
    }

    function triggerDeleteTest(index) {
        let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
        const targetObj = tests[index];

        showCustomModal({
            title: "Purge Test Sheet?",
            desc: `Are you sure you want to delete "${targetObj.name}"? All questions inside will be lost.`,
            numInputs: 0, confirmClass: "modal-btn-danger", confirmText: "Delete Test",
            onConfirm: function() {
                tests.splice(index, 1);
                localStorage.setItem(getChaptersKey(), JSON.stringify(tests));

                const transaction = db.transaction(["mistakes"], "readwrite");
                const store = transaction.objectStore("mistakes");
                store.getAll().onsuccess = function(e) {
                    e.target.result.forEach(item => {
                        if (item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === targetObj.name) {
                            store.delete(item.id);
                        }
                    });
                };

                transaction.oncomplete = function() {
                    if (currentSelectedChapter === targetObj.name) resetToUploadMode();
                    else loadChaptersList();
                };
            }
        });
    }

    function selectAndViewChapter(ch) {
        currentSelectedChapter = ch;
        loadChaptersList();
        document.getElementById('upload-panel-box').style.display = 'none';
        document.getElementById('results-display-area').style.display = 'block';
        document.getElementById('active-target-chapter').innerText = ch;
        renderMistakes();
    }

    function resetToUploadMode() {
        currentSelectedChapter = 'NONE';
        loadChaptersList();
        document.getElementById('upload-panel-box').style.display = 'block';
        document.getElementById('results-display-area').style.display = 'none';
    }

    function switchSubject(sub) {
        currentSubjectTab = sub;
        document.querySelectorAll('.subject-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        resetToUploadMode();
        document.getElementById('current-loc').innerText = `${CURRENT_MAIN_PAGE} > ${currentSubjectTab}`;
        loadChaptersList();
    }

    function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type === "application/pdf") {
            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    pdf.getPage(1).then(function(page) {
                        const viewport = page.getViewport({scale: 1.5});
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        const renderContext = { canvasContext: ctx, viewport: viewport };
                        page.render(renderContext).promise.then(function() {
                            canvas.toBlob(blob => { handlePhotoIngestion(blob); }, 'image/jpeg', 0.85);
                        });
                    });
                });
            };
            fileReader.readAsArrayBuffer(file);
        } else {
            handlePhotoIngestion(file);
        }
        e.target.value = '';
    }

    function handlePhotoIngestion(imageBlob) {
        showCustomModal({
            title: "Assign Test Slot",
            desc: "Enter the explicit Test tracking title name (Compulsory):",
            numInputs: 1, placeholder1: "e.g., AIOTS-01",
            onConfirm: function(targetChapter) {
                if (!targetChapter) return;
                let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];

                if (!tests.some(t => t.name.toLowerCase() === targetChapter.toLowerCase())) {
                    showCustomModal({
                        title: "Create Test Slot?",
                        desc: `The test "${targetChapter}" does not exist. Auto create it?`,
                        numInputs: 0, confirmText: "Create Slot",
                        onConfirm: function() {
                            const todayStr = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});
                            tests.push({ name: targetChapter, date: todayStr });
                            localStorage.setItem(getChaptersKey(), JSON.stringify(tests));
                            loadChaptersList();
                            promptForCaptionAndSave(imageBlob, targetChapter);
                        }
                    });
                } else {
                    promptForCaptionAndSave(imageBlob, targetChapter);
                }
            }
        });
    }

    function handleTextInputWorkflow() {
        showCustomModal({
            title: "Select Test Slot",
            desc: "Enter Target Test Title Name (Compulsory):",
            numInputs: 1, placeholder1: "e.g., AIOTS-01",
            onConfirm: function(targetChapter) {
                if (!targetChapter) return;
                let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];

                if (!tests.some(t => t.name.toLowerCase() === targetChapter.toLowerCase())) {
                    showCustomModal({
                        title: "Create Slot?",
                        desc: `Test "${targetChapter}" doesn't exist. Create slot?`,
                        numInputs: 0, confirmText: "Create",
                        onConfirm: function() {
                            const todayStr = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});
                            tests.push({ name: targetChapter, date: todayStr });
                            localStorage.setItem(getChaptersKey(), JSON.stringify(tests));
                            loadChaptersList();
                            promptForTextDetails(targetChapter);
                        }
                    });
                } else {
                    promptForTextDetails(targetChapter);
                }
            }
        });
    }

    function promptForTextDetails(targetChapter) {
        showCustomModal({
            title: "Add Written Question Data",
            desc: "Fill up Question text body and its Detailed Solution:",
            numInputs: 2,
            placeholder1: "Type question here...",
            placeholder2: "Type detailed solution/note here...",
            onConfirm: function(qText, qSol) {
                if(!qText) { alert("Question content cannot be empty."); return; }
                saveTextMistakeToDB(targetChapter, qText, qSol);
            }
        });
    }

    // Critical Fix: Double Trigger Isolation Core Architecture
    function promptForCaptionAndSave(imageBlob, targetChapter) {
        showCustomModal({
            title: "Add Caption",
            desc: "Enter a question caption/note (Optional):",
            numInputs: 1, placeholder1: "e.g., Q.14 Calculation Error",
            onConfirm: function(customCaption) {
                saveMistakeToDB(imageBlob, targetChapter, customCaption);
            }
        });
    }

    function saveMistakeToDB(imageBlob, targetChapter, customCaption) {
        const transaction = db.transaction(["mistakes"], "readwrite");
        const store = transaction.objectStore("mistakes");
        store.getAll().onsuccess = function(e) {
            const totalInChapter = e.target.result.filter(item => 
                item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === targetChapter
            ).length;
            const nextIndex = totalInChapter + 1;
            const finalTitle = customCaption ? customCaption : `Question ${nextIndex}`;
            const currentDate = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});

            const reader = new FileReader();
            reader.readAsDataURL(imageBlob);
            reader.onloadend = function() {
                const newItem = {
                    mainTab: CURRENT_MAIN_PAGE, subjectTab: currentSubjectTab, chapterName: targetChapter,
                    questionIndex: nextIndex, questionTitle: finalTitle, dateAdded: currentDate, image: reader.result, 
                    isPinned: false, contentType: "media"
                };
                const addTrans = db.transaction(["mistakes"], "readwrite");
                addTrans.objectStore("mistakes").add(newItem).onsuccess = function() {
                    if(currentSelectedChapter === targetChapter) renderMistakes();
                };
            }
        };
    }

    function saveTextMistakeToDB(targetChapter, textContent, solutionContent) {
        const transaction = db.transaction(["mistakes"], "readwrite");
        const store = transaction.objectStore("mistakes");
        store.getAll().onsuccess = function(e) {
            const totalInChapter = e.target.result.filter(item => 
                item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === targetChapter
            ).length;
            const nextIndex = totalInChapter + 1;
            const currentDate = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});

            const newItem = {
                mainTab: CURRENT_MAIN_PAGE, subjectTab: currentSubjectTab, chapterName: targetChapter,
                questionIndex: nextIndex, questionTitle: textContent.length > 30 ? textContent.substring(0, 30) + "..." : textContent, dateAdded: currentDate,
                isPinned: false, contentType: "text", textBody: textContent, solutionBody: solutionContent || "No custom solution provided."
            };
            const addTrans = db.transaction(["mistakes"], "readwrite");
            addTrans.objectStore("mistakes").add(newItem).onsuccess = function() {
                if(currentSelectedChapter === targetChapter) renderMistakes();
            };
        };
    }

    function toggleDropdown(e, id) {
        e.stopPropagation();
        document.querySelectorAll('.dropdown-menu-list').forEach(m => { if(m.id !== 'menu-' + id) m.style.display = 'none'; });
        const targetMenu = document.getElementById('menu-' + id);
        targetMenu.style.display = targetMenu.style.display === 'block' ? 'none' : 'block';
    }

    function deleteQuestion(id) {
        showCustomModal({
            title: "Confirm Deletion", desc: "Permanently delete this logged question?", numInputs: 0, confirmClass: "modal-btn-danger", confirmText: "Delete",
            onConfirm: function() {
                db.transaction(["mistakes"], "readwrite").objectStore("mistakes").delete(id).onsuccess = function() {
                    renderMistakes();
                };
            }
        });
    }

    function editQuestionCaption(id, currentText, type) {
        if(type === 'text') {
            const transaction = db.transaction(["mistakes"], "readwrite");
            const store = transaction.objectStore("mistakes");
            store.get(id).onsuccess = function(e) {
                const data = e.target.result;
                showCustomModal({
                    title: "Edit Written Question", desc: "Modify data content parameters:", numInputs: 2,
                    val1: data.textBody, placeholder1: "Question text body",
                    val2: data.solutionBody, placeholder2: "Solution body",
                    onConfirm: function(newBody, newSol) {
                        if(!newBody) return;
                        data.textBody = newBody;
                        data.solutionBody = newSol || "No custom solution provided.";
                        data.questionTitle = newBody.length > 30 ? newBody.substring(0, 30) + "..." : newBody;
                        const saveTrans = db.transaction(["mistakes"], "readwrite");
                        saveTrans.objectStore("mistakes").put(data).onsuccess = function() { renderMistakes(); };
                    }
                });
            };
        } else {
            showCustomModal({
                title: "Update Caption", desc: "Modify description note:", numInputs: 1, val1: currentText,
                onConfirm: function(newCaption) {
                    const transaction = db.transaction(["mistakes"], "readwrite");
                    const store = transaction.objectStore("mistakes");
                    store.get(id).onsuccess = function(e) {
                        const data = e.target.result;
                        data.questionTitle = newCaption ? newCaption : `Question ${data.questionIndex}`;
                        store.put(data).onsuccess = function() { renderMistakes(); };
                    };
                }
            });
        }
    }

    function togglePinQuestion(id) {
        const transaction = db.transaction(["mistakes"], "readwrite");
        const store = transaction.objectStore("mistakes");
        store.get(id).onsuccess = function(e) {
            const data = e.target.result;
            data.isPinned = !data.isPinned;
            store.put(data).onsuccess = function() { renderMistakes(); };
        };
    }

    function toggleSolutionCollapse(id) {
        const solBox = document.getElementById(`sol-box-${id}`);
        const btn = document.getElementById(`sol-btn-${id}`);
        if(solBox.style.display === 'block') {
            solBox.style.display = 'none';
            btn.innerText = "👁️ Show Solution";
        } else {
            solBox.style.display = 'block';
            btn.innerText = "🙈 Hide Solution";
        }
    }

    function openFullscreen(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
    function closeFullscreen() { document.getElementById('lightbox').style.display = 'none'; }

    async function openCamera() {
        document.getElementById('camera-modal').style.display = 'flex';
        try { streamRef = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false }); document.getElementById('video').srcObject = streamRef; }
        catch (err) { alert("Camera capture failed."); closeCamera(); }
    }
    function closeCamera() { document.getElementById('camera-modal').style.display = 'none'; if(streamRef) streamRef.getTracks().forEach(t => t.stop()); }
    function captureSnapshot() {
        const video = document.getElementById('video'); const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => { closeCamera(); handlePhotoIngestion(blob); }, 'image/jpeg', 0.85);
    }

    function renderMistakes() {
        const container = document.getElementById('mistakes-container');
        container.innerHTML = '';
        if (!db || currentSelectedChapter === 'NONE') return;

        db.transaction(["mistakes"], "readonly").objectStore("mistakes").getAll().onsuccess = function(e) {
            let filtered = e.target.result.filter(item => 
                item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === currentSelectedChapter
            );
            if(filtered.length === 0) {
                container.innerHTML = `<p style="color: #94a3b8; text-align: center; padding: 40px 0; font-size:0.95rem;">No registered question modules identified in this segment.</p>`;
                return;
            }
            filtered.sort((a, b) => (b.isPinned || 0) - (a.isPinned || 0));
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `mistake-card-row ${item.isPinned ? 'pinned' : ''}`;
                
                let dynamicContentHTML = '';
                if(item.contentType === "text") {
                    dynamicContentHTML = `
                        <div class="text-question-container"><b>Q:</b> ${item.textBody}</div>
                        <button class="sol-toggle-btn" id="sol-btn-${item.id}" onclick="toggleSolutionCollapse(${item.id})">👁️ Show Solution</button>
                        <div class="text-solution-box" id="sol-box-${item.id}"><b>Solution:</b> ${item.solutionBody}</div>
                    `;
                } else {
                    dynamicContentHTML = `
                        <div class="img-container-box" onclick="openFullscreen('${item.image}')">
                            <img src="${item.image}" alt="Question Image">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="mistake-meta">
                        <div class="mistake-index">${item.isPinned ? '📌' : '#'} Q.${item.questionIndex}</div>
                        <div class="mistake-caption" title="${item.questionTitle}">${item.questionTitle}</div>
                        <div class="mistake-date">${item.dateAdded}</div>
                    </div>
                    <button class="menu-action-trigger" onclick="toggleDropdown(event, ${item.id})">⋮</button>
                    <div class="dropdown-menu-list" id="menu-${item.id}">
                        <button onclick="togglePinQuestion(${item.id})">${item.isPinned ? '📍 Unpin' : '📌 Pin Card'}</button>
                        <button onclick="editQuestionCaption(${item.id}, '${item.questionTitle}', '${item.contentType || 'media'}')">✏️ Edit</button>
                        <button class="del-action" onclick="deleteQuestion(${item.id})">🗑️ Delete</button>
                    </div>
                    ${dynamicContentHTML}
                `;
                container.appendChild(card);
            });
        };
    }
</script>
</body>
