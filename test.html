<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mistakes - Test Manager</title>
    <style>
        /* Futuristic Fonts & Variables */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

        :root {
            --bg-dark: #060913;
            --bg-card: rgba(13, 18, 36, 0.8);
            --neon-blue: #00f2fe;
            --neon-purple: #9d4edd;
            --neon-pink: #ff007f;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --cyber-glow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: radial-gradient(circle at top right, #16113a 0%, #060913 60%, #02040a 100%);
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 15px; 
            padding-bottom: 110px;
            overflow-x: hidden;
            position: relative;
        }

        /* Live Running Background Grid Layer */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridRunner 25s linear infinite;
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes gridRunner {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, -40px); }
        }

        .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 10; }
        
        /* --- PAGE HEADER --- */
        .page-header { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            padding-bottom: 15px;
            text-align: center;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem; 
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.3));
            animation: pulseGlow 3s infinite alternate;
        }

        /* --- SUBJECT TABS WITH RADIAL RIPPLE ANIMS --- */
        .subject-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted); 
            padding: 14px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; 
            font-size: 1.1rem;
            letter-spacing: 1px;
            flex: 1; 
            text-align: center; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%; width: 0; height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
        .tab-btn:hover::after { width: 120%; height: 120%; opacity: 0; }
        .tab-btn:hover {
            color: #fff;
            border-color: var(--neon-blue);
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
            transform: translateY(-2px);
        }
        .tab-btn:active { transform: translateY(1px) scale(0.98); }
        .tab-btn.active { 
            background: linear-gradient(135deg, var(--neon-blue), #0077b6); 
            border-color: transparent; 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4), inset 0 0 8px rgba(255,255,255,0.3); 
            color: #000; 
            font-weight: 800;
            transform: translateY(-2px);
        }

        /* Section Sub-headings */
        .chapter-section-header { 
            font-family: 'Rajdhani', sans-serif;
            margin-top: 20px; 
            margin-bottom: 12px; 
            color: var(--neon-blue); 
            font-size: 1.2rem; 
            font-weight: 700; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .chapters-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; padding: 5px 0; }
        
        /* --- TEST SLOTS BUTTONS ANIMATED --- */
        .ch-btn-wrapper { position: relative; display: inline-block; animation: fadeInUp 0.5s ease; }
        .ch-btn {
            background: var(--bg-card); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main); 
            padding: 10px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            user-select: none; -webkit-user-select: none;
            display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center;
        }
        .ch-btn span.t-date { font-size: 0.75rem; color: var(--text-muted); font-weight: normal; font-family: 'Rajdhani', sans-serif; }
        
        .ch-btn:hover {
            border-color: var(--neon-purple);
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 5px 18px rgba(157, 77, 221, 0.3);
        }
        .ch-btn:active { transform: translateY(-1px) scale(0.98); }
        .ch-btn.active { 
            background: linear-gradient(135deg, var(--neon-purple), #bd284a); 
            color: white; 
            border-color: transparent; 
            box-shadow: 0 0 18px rgba(157, 77, 221, 0.6), inset 0 0 6px rgba(255,255,255,0.2); 
            transform: translateY(-2px);
        }
        .ch-btn.active span.t-date { color: #f1f5f9; }

        /* Dropdown Menu */
        .ch-dropdown-menu { 
            display: none; position: absolute; top: 100%; left: 0; margin-top: 5px; 
            background: #0d111d; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); z-index: 150; width: 130px; overflow: hidden;
            animation: fadeIn 0.2s ease;
        }
        .ch-dropdown-menu button { width: 100%; background: none; border: none; color: #cbd5e1; padding: 10px 12px; text-align: left; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s, padding-left 0.2s; }
        .ch-dropdown-menu button:hover { background: rgba(255,255,255,0.08); color: #fff; padding-left: 16px; }
        .ch-dropdown-menu button.del-action { color: var(--neon-pink); }

        /* --- UPLOAD SECTION --- */
        .upload-section { 
            background: var(--bg-card); 
            border: 1px solid rgba(0, 242, 254, 0.15); 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 35px; 
            text-align: center; 
            backdrop-filter: blur(15px); 
            box-shadow: inset 0 0 15px rgba(0,242,254,0.02), 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease;
        }
        .upload-section p { font-size: 1rem; color: var(--text-muted); margin-bottom: 5px; }
        
        .upload-btn-wrapper { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px;}
        
        /* Cyber Action Buttons with High Performance Glow Transitions */
        .action-btn { 
            padding: 12px 25px; 
            border-radius: 12px; 
            border: none; 
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; 
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2); 
            position: relative;
        }
        .action-btn:hover { transform: translateY(-4px) scale(1.02); filter: brightness(1.2); }
        .action-btn:active { transform: translateY(-1px) scale(0.97); }
        
        .camera-btn { background: linear-gradient(45deg, #f97316, #ea580c); color: white; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3); }
        .camera-btn:hover { box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5), 0 0 10px rgba(249, 115, 22, 0.3); }
        
        .file-btn { background: linear-gradient(45deg, #10b981, #059669); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .file-btn:hover { box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5), 0 0 10px rgba(16, 185, 129, 0.3); }
        
        .text-btn { background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); }
        .text-btn:hover { box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5), 0 0 10px rgba(14, 165, 233, 0.3); }
        input[type="file"] { display: none; }

        /* Dual Floating Buttons (Symmetric & Balanced) */
        .floating-add-btn {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), #00b4d8); color: #000; border: none; font-size: 2.2rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 999;
        }
        .floating-add-btn:hover { transform: scale(1.15) rotate(90deg); box-shadow: 0 0 30px rgba(0, 242, 254, 0.9); }
        .floating-add-btn:active { transform: scale(0.95); }

        /* Modified Floating Back Arrow Button (Symmetrical to Add Button on Left) */
        .floating-back-btn {
            position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-purple), #7c3aed); color: #fff; border: none; font-size: 1.6rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none;
            box-shadow: 0 0 20px rgba(157, 77, 221, 0.5); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 999;
        }
        .floating-back-btn:hover { transform: scale(1.15) translateX(-5px); box-shadow: 0 0 30px rgba(157, 77, 221, 0.8); }
        .floating-back-btn:active { transform: scale(0.95); }

        /* --- QUESTION VIEW AREA --- */
        .results-container-block { display: none; margin-top: 10px; animation: fadeIn 0.5s ease; }
        .viewing-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 4px solid var(--neon-purple); padding-left: 12px; }
        .viewing-header h3 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 0.5px; }
        
        .exit-view-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #fff; 
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
        }
        .exit-view-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--neon-blue); transform: scale(1.05); box-shadow: 0 0 10px rgba(0,242,254,0.2); }
        .exit-view-btn:active { transform: scale(0.95); }
        
        .mistakes-row-list { display: flex; flex-direction: column; gap: 16px; }
        
        /* Mistake Cards Upgrade */
        .mistake-card-row { 
            background: var(--bg-card); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 12px;
            position: relative; height: auto; min-height: 180px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease;
        }
        .mistake-card-row:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.15);
        }
        .mistake-card-row.pinned { 
            border-color: #eab308; 
            background: linear-gradient(to bottom right, rgba(234, 179, 8, 0.05), rgba(13, 18, 36, 0.85)); 
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.15);
        }
        
        .mistake-meta { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; padding-right: 35px; }
        .mistake-index { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--neon-blue); white-space: nowrap; }
        .mistake-caption { font-size: 1rem; color: #ffffff; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; letter-spacing: 0.3px; }
        .mistake-date { font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
        
        /* Media Box */
        .img-container-box { width: 100%; height: 220px; overflow: hidden; border-radius: 10px; background: #070913; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.3s; }
        .img-container-box:hover { border-color: var(--neon-blue); }
        .mistake-card-row img { width: 100%; height: 100%; object-fit: contain; display: block; transition: transform 0.3s; }
        .img-container-box:hover img { transform: scale(1.02); }

        /* Text Question Content */
        .text-question-container { 
            width: 100%; background: #090d1a; border-radius: 10px; padding: 14px; 
            font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; overflow-y: auto; 
            border: 1px dashed rgba(255,255,255,0.12); word-break: break-word; 
        }
        .text-question-container b { color: var(--neon-blue); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; margin-right: 4px; }
        
        .sol-toggle-btn { 
            background: rgba(157, 77, 221, 0.1); border: 1px solid rgba(157, 77, 221, 0.3); color: #c8b6ff; 
            padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 600; 
            width: max-content; align-self: flex-start; margin-top: 4px; transition: all 0.3s; 
        }
        .sol-toggle-btn:hover { background: rgba(157, 77, 221, 0.25); box-shadow: 0 0 10px rgba(157, 77, 221, 0.2); transform: scale(1.02); }
        .sol-toggle-btn:active { transform: scale(0.97); }
        
        .text-solution-box { 
            display: none; background: #07151a; border-radius: 8px; padding: 12px; 
            font-size: 0.9rem; line-height: 1.5; color: #a7f3d0; border-left: 3px solid #10b981; 
            margin-top: 6px; word-break: break-word; animation: fadeIn 0.3s ease;
        }
        .text-solution-box b { color: #10b981; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; }

        .menu-action-trigger { position: absolute; top: 12px; right: 12px; color: var(--text-muted); background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 2px 6px; z-index: 10; transition: color 0.2s; }
        .menu-action-trigger:hover { color: #fff; }
        
        .dropdown-menu-list { 
            display: none; position: absolute; top: 38px; right: 12px; background: #0d111d; 
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; width: 130px; overflow: hidden;
            animation: fadeIn 0.2s ease;
        }
        .dropdown-menu-list button { width: 100%; background: none; border: none; color: #cbd5e1; padding: 10px 12px; text-align: left; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s, padding-left 0.2s; }
        .dropdown-menu-list button:hover { background: rgba(255,255,255,0.08); color: #fff; padding-left: 16px; }
        .dropdown-menu-list button.del-action { color: var(--neon-pink); }

        /* --- MODERN LIGHTBOX --- */
        .lightbox-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 4, 8, 0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .lightbox-modal img { max-width: 95%; max-height: 90vh; object-fit: contain; border-radius: 12px; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2rem; cursor: pointer; background: rgba(255,255,255,0.1); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .lightbox-close:hover { background: rgba(255,255,255,0.25); }

        /* --- CYBER MODALS --- */
        .app-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 12, 0.85); backdrop-filter: blur(12px);
            z-index: 3000; align-items: center; justify-content: center; padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .app-modal-card {
            background: #0d1121; border: 1px solid rgba(0, 242, 254, 0.2);
            width: 100%; max-width: 420px; border-radius: 20px; padding: 25px;
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.15);
            transform: scale(0.95); animation: modalGrow 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .app-modal-card h4 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 600; margin-bottom: 12px; color: var(--neon-blue); letter-spacing: 0.5px; }
        .app-modal-card p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
        .app-modal-input {
            width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #fff; font-size: 0.95rem; outline: none; margin-bottom: 12px; transition: border-color 0.3s;
        }
        .app-modal-input:focus { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(157, 77, 221, 0.2); }
        .app-modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 15px; }
        .modal-btn { padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .modal-btn-cancel { background: rgba(255,255,255,0.06); color: #cbd5e1; }
        .modal-btn-cancel:hover { background: rgba(255,255,255,0.12); }
        .modal-btn-primary { background: linear-gradient(135deg, var(--neon-purple), #7c3aed); color: #fff; }
        .modal-btn-primary:hover { filter: brightness(1.2); }
        .modal-btn-danger { background: var(--neon-pink); color: #fff; }
        .modal-btn-danger:hover { filter: brightness(1.2); box-shadow: 0 0 15px rgba(255,0,127,0.4); }

        #camera-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2,3,6,0.96); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; gap: 20px; backdrop-filter: blur(10px); }
        #video { width: 90%; max-width: 500px; border-radius: 16px; border: 2px solid rgba(0, 242, 254, 0.3); box-shadow: var(--cyber-glow); }

        /* --- ANIMATIONS CORE --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes modalGrow {
            to { transform: scale(1); }
        }
        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.2)); }
            100% { filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.5)); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1 id="page-title">TEST SECTION</h1>
    </div>

    <div class="subject-tabs">
        <button class="tab-btn active" onclick="switchSubject('PHYSICS', event)">PHYSICS</button>
        <button class="tab-btn" onclick="switchSubject('CHEMISTRY', event)">CHEMISTRY</button>
        <button class="tab-btn" onclick="switchSubject('MATHS', event)">MATHS</button>
    </div>

    <div class="chapter-section-header">Tests logged: <span style="font-size: 0.8rem; color:var(--text-muted); font-weight: normal; margin-left: 5px; text-transform: none;">(Long-press or Right-click to Rename/Delete)</span></div>
    <div class="chapters-container" id="chapters-list-wrapper"></div>

    <div class="upload-section" id="upload-panel-box">
        <p>Upload new entries to:</p>
        <b id="current-loc" style="color:var(--neon-blue); text-transform: uppercase; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; font-size: 1.1rem;">TEST > PHYSICS</b>
        <div class="upload-btn-wrapper">
            <button class="action-btn camera-btn" onclick="openCamera()">📸 Open Camera</button>
            <button class="action-btn file-btn" onclick="document.getElementById('file-input').click()">📁 Upload PDF/Photo</button>
            <button class="action-btn text-btn" onclick="handleTextInputWorkflow()">✍️ Add Text Qn</button>
            <input type="file" id="file-input" accept="image/*,application/pdf" onchange="handleFileUpload(event)">
        </div>
    </div>

    <div class="results-container-block" id="results-display-area">
        <div class="viewing-header">
            <h3>Questions for: <span id="active-target-chapter" style="color: var(--neon-purple);">None</span></h3>
            <button class="exit-view-btn" onclick="resetToUploadMode()">Back to Uploads ⬆</button>
        </div>
        <div class="mistakes-row-list" id="mistakes-container"></div>
    </div>
</div>

<a href="index.html" class="floating-back-btn" title="Go Home">←</a>
<button class="floating-add-btn" onclick="triggerTestCreationModal()" title="Add New Test">+</button>

<div class="app-modal-overlay" id="custom-app-modal">
    <div class="app-modal-card">
        <h4 id="modal-title">Title</h4>
        <p id="modal-desc">Description</p>
        <input type="text" class="app-modal-input" id="modal-input-field-1">
        <input type="text" class="app-modal-input" id="modal-input-field-2">
        <div class="app-modal-actions" id="modal-actions-box"></div>
    </div>
</div>

<div class="lightbox-modal" id="lightbox" onclick="closeFullscreen()">
    <button class="lightbox-close">&times;</button>
    <img id="lightbox-img" src="">
</div>

<div id="camera-modal">
    <video id="video" autoplay playsinline></video>
    <div style="display: flex; gap: 20px;">
        <button class="action-btn file-btn" onclick="captureSnapshot()">⚡ Click Photo</button>
        <button class="action-btn camera-btn" onclick="closeCamera()" style="background: var(--neon-pink); box-shadow: 0 4px 15px rgba(255,0,127,0.3);">Cancel</button>
    </div>
</div>

<script>
    const CURRENT_MAIN_PAGE = 'TEST'; 
    let currentSubjectTab = 'PHYSICS';
    let currentSelectedChapter = 'NONE'; 
    let db = null;
    let streamRef = null;

    const getChaptersKey = () => `ch_${CURRENT_MAIN_PAGE}_${currentSubjectTab}`;

    const dbRequest = indexedDB.open("MyMistakesDB", 1);
    dbRequest.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("mistakes")) {
            db.createObjectStore("mistakes", { keyPath: "id", autoIncrement: true });
        }
    };
    dbRequest.onsuccess = function(e) {
        db = e.target.result;
        loadChaptersList();
        
        document.addEventListener('click', function(event) {
            if (!event.target.classList.contains('menu-action-trigger')) {
                document.querySelectorAll('.dropdown-menu-list').forEach(m => m.style.display = 'none');
            }
            if (!event.target.closest('.ch-btn')) {
                document.querySelectorAll('.ch-dropdown-menu').forEach(m => m.style.display = 'none');
            }
        });
    };

    function showCustomModal({ title, desc, numInputs, val1, placeholder1, val2, placeholder2, confirmClass, confirmText, onConfirm }) {
        const overlay = document.getElementById('custom-app-modal');
        const inp1 = document.getElementById('modal-input-field-1');
        const inp2 = document.getElementById('modal-input-field-2');
        const actions = document.getElementById('modal-actions-box');

        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc || '';
        
        inp1.style.display = (numInputs >= 1) ? 'block' : 'none';
        if(numInputs >= 1) { inp1.value = val1 || ''; inp1.placeholder = placeholder1 || ''; }

        inp2.style.display = (numInputs >= 2) ? 'block' : 'none';
        if(numInputs >= 2) { inp2.value = val2 || ''; inp2.placeholder = placeholder2 || ''; }

        actions.innerHTML = `
            <button class="modal-btn modal-btn-cancel" onclick="hideCustomModal()">Cancel</button>
            <button class="modal-btn ${confirmClass || 'modal-btn-primary'}" id="modal-confirm-trigger-btn">${confirmText || 'Confirm'}</button>
        `;

        document.getElementById('modal-confirm-trigger-btn').onclick = function() {
            const out1 = inp1.value.trim();
            const out2 = inp2.value.trim();
            hideCustomModal();
            if (onConfirm) onConfirm(out1, out2);
        };

        overlay.style.display = 'flex';
        if(numInputs >= 1) setTimeout(() => inp1.focus(), 50);
    }

    function hideCustomModal() { document.getElementById('custom-app-modal').style.display = 'none'; }

    function loadChaptersList() {
        const wrapper = document.getElementById('chapters-list-wrapper');
        let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
        if(tests.length === 0) {
            wrapper.innerHTML = `<p style="color: #94a3b8; font-size: 0.85rem; padding: 5px 0;">No Tests registered yet. Click '+' button below to create a slot.</p>`;
            return;
        }
        
        wrapper.innerHTML = '';
        tests.forEach((tObj, idx) => {
            const block = document.createElement('div');
            block.className = 'ch-btn-wrapper';
            block.innerHTML = `
                <button class="ch-btn ${currentSelectedChapter === tObj.name ? 'active' : ''}" id="ch-trigger-${idx}">
                        ${tObj.name}
                        <span class="t-date">${tObj.date || 'No Date'}</span>
                </button>
                <div class="ch-dropdown-menu" id="ch-menu-${idx}">
                    <button id="rename-act-${idx}">✏️ Rename</button>
                    <button class="del-action" id="delete-act-${idx}">🗑️ Delete</button>
                </div>
            `;
            wrapper.appendChild(block);

            const btn = document.getElementById(`ch-trigger-${idx}`);
            let isLongPress = false;
            let holdTimer = null;

            const triggerMenuAction = (e) => {
                e.preventDefault(); e.stopPropagation();
                document.querySelectorAll('.ch-dropdown-menu').forEach(m => m.style.display = 'none');
                document.getElementById(`ch-menu-${idx}`).style.display = 'block';
            };

            // Setup dedicated actions inside dropdown menus safely
            document.getElementById(`rename-act-${idx}`).onclick = (e) => { e.stopPropagation(); triggerRenameTest(idx); };
            document.getElementById(`delete-act-${idx}`).onclick = (e) => { e.stopPropagation(); triggerDeleteTest(idx); };

            btn.addEventListener('contextmenu', triggerMenuAction);
            
            btn.addEventListener('touchstart', (e) => { 
                isLongPress = false;
                holdTimer = setTimeout(() => { 
                    isLongPress = true; 
                    triggerMenuAction(e); 
                }, 600); 
            }, { passive: true });
            
            btn.addEventListener('touchend', (e) => { 
                if (holdTimer) clearTimeout(holdTimer); 
                if (!isLongPress && document.getElementById(`ch-menu-${idx}`).style.display !== 'block') {
                    selectAndViewChapter(tObj.name);
                }
            });
            
            btn.addEventListener('touchmove', () => { if (holdTimer) clearTimeout(holdTimer); });
            
            btn.addEventListener('click', (e) => {
                // Ignore regular click if triggered by simulated tap to prevent duplicate rendering
                if(e.pointerType === '') return; 
                if (document.getElementById(`ch-menu-${idx}`).style.display !== 'block') {
                    selectAndViewChapter(tObj.name);
                }
            });
        });
    }

    function triggerTestCreationModal() {
        showCustomModal({
            title: "Register New Test Slot",
            desc: "Provide distinct Tracking Name and Date values:",
            numInputs: 2,
            placeholder1: "e.g., AIOTS-01, Part Test 3",
            placeholder2: "e.g., 24/05/2026, Today",
            onConfirm: function(tName, tDate) {
                if (!tName) return;
                let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
                if (!tests.some(t => t.name.toLowerCase() === tName.toLowerCase())) {
                    tests.push({ name: tName, date: tDate || 'No Date' });
                    localStorage.setItem(getChaptersKey(), JSON.stringify(tests));
                    loadChaptersList();
                } else {
                    alert("A test with this title already exists!");
                }
            }
        });
    }

    function triggerRenameTest(index) {
        let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
        const oldObj = tests[index];

        showCustomModal({
            title: "Modify Test Parameters",
            desc: "Edit target Name and scheduling Date tags:",
            numInputs: 2,
            val1: oldObj.name, placeholder1: "Test Name",
            val2: oldObj.date, placeholder2: "Test Date",
            onConfirm: function(newName, newDate) {
                if (!newName) return;
                const oldName = oldObj.name;
                tests[index] = { name: newName, date: newDate || 'No Date' };
                localStorage.setItem(getChaptersKey(), JSON.stringify(tests));

                const transaction = db.transaction(["mistakes"], "readwrite");
                const store = transaction.objectStore("mistakes");
                store.getAll().onsuccess = function(e) {
                    e.target.result.forEach(item => {
                        if (item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === oldName) {
                            item.chapterName = newName;
                            store.put(item);
                        }
                    });
                };
                
                transaction.oncomplete = function() {
                    if (currentSelectedChapter === oldName) {
                        currentSelectedChapter = newName;
                        document.getElementById('active-target-chapter').innerText = newName;
                    }
                    loadChaptersList();
                    renderMistakes();
                };
            }
        });
    }

    function triggerDeleteTest(index) {
        let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];
        const targetObj = tests[index];

        showCustomModal({
            title: "Purge Test Sheet?",
            desc: `Are you sure you want to delete "${targetObj.name}"? All questions inside will be lost.`,
            numInputs: 0, confirmClass: "modal-btn-danger", confirmText: "Delete Test",
            onConfirm: function() {
                tests.splice(index, 1);
                localStorage.setItem(getChaptersKey(), JSON.stringify(tests));

                const transaction = db.transaction(["mistakes"], "readwrite");
                const store = transaction.objectStore("mistakes");
                store.getAll().onsuccess = function(e) {
                    e.target.result.forEach(item => {
                        if (item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === targetObj.name) {
                            store.delete(item.id);
                        }
                    });
                };

                transaction.oncomplete = function() {
                    if (currentSelectedChapter === targetObj.name) resetToUploadMode();
                    else loadChaptersList();
                };
            }
        });
    }

    function selectAndViewChapter(ch) {
        currentSelectedChapter = ch;
        loadChaptersList();
        document.getElementById('upload-panel-box').style.display = 'none';
        document.getElementById('results-display-area').style.display = 'block';
        document.getElementById('active-target-chapter').innerText = ch;
        renderMistakes();
    }

    function resetToUploadMode() {
        currentSelectedChapter = 'NONE';
        loadChaptersList();
        document.getElementById('upload-panel-box').style.display = 'block';
        document.getElementById('results-display-area').style.display = 'none';
    }

    function switchSubject(sub, event) {
        currentSubjectTab = sub;
        document.querySelectorAll('.subject-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        if (event && event.target) {
            event.target.classList.add('active');
        }
        resetToUploadMode();
        document.getElementById('current-loc').innerText = `${CURRENT_MAIN_PAGE} > ${currentSubjectTab}`;
        loadChaptersList();
    }

    function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type === "application/pdf") {
            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    pdf.getPage(1).then(function(page) {
                        const viewport = page.getViewport({scale: 1.5});
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        const renderContext = { canvasContext: ctx, viewport: viewport };
                        page.render(renderContext).promise.then(function() {
                            canvas.toBlob(blob => { handlePhotoIngestion(blob); }, 'image/jpeg', 0.85);
                        });
                    });
                });
            };
            fileReader.readAsArrayBuffer(file);
        } else {
            handlePhotoIngestion(file);
        }
        e.target.value = '';
    }

    function handlePhotoIngestion(imageBlob) {
        showCustomModal({
            title: "Assign Test Slot",
            desc: "Enter the explicit Test tracking title name (Compulsory):",
            numInputs: 1, placeholder1: "e.g., AIOTS-01",
            onConfirm: function(targetChapter) {
                if (!targetChapter) return;
                let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];

                if (!tests.some(t => t.name.toLowerCase() === targetChapter.toLowerCase())) {
                    showCustomModal({
                        title: "Create Test Slot?",
                        desc: `The test "${targetChapter}" does not exist. Auto create it?`,
                        numInputs: 0, confirmText: "Create Slot",
                        onConfirm: function() {
                            const todayStr = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});
                            tests.push({ name: targetChapter, date: todayStr });
                            localStorage.setItem(getChaptersKey(), JSON.stringify(tests));
                            loadChaptersList();
                            promptForCaptionAndSave(imageBlob, targetChapter);
                        }
                    });
                } else {
                    promptForCaptionAndSave(imageBlob, targetChapter);
                }
            }
        });
    }

    function handleTextInputWorkflow() {
        showCustomModal({
            title: "Select Test Slot",
            desc: "Enter Target Test Title Name (Compulsory):",
            numInputs: 1, placeholder1: "e.g., AIOTS-01",
            onConfirm: function(targetChapter) {
                if (!targetChapter) return;
                let tests = JSON.parse(localStorage.getItem(getChaptersKey())) || [];

                if (!tests.some(t => t.name.toLowerCase() === targetChapter.toLowerCase())) {
                    showCustomModal({
                        title: "Create Slot?",
                        desc: `Test "${targetChapter}" doesn't exist. Create slot?`,
                        numInputs: 0, confirmText: "Create",
                        onConfirm: function() {
                            const todayStr = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});
                            tests.push({ name: targetChapter, date: todayStr });
                            localStorage.setItem(getChaptersKey(), JSON.stringify(tests));
                            loadChaptersList();
                            promptForTextDetails(targetChapter);
                        }
                    });
                } else {
                    promptForTextDetails(targetChapter);
                }
            }
        });
    }

    function promptForTextDetails(targetChapter) {
        showCustomModal({
            title: "Add Written Question Data",
            desc: "Fill up Question text body and its Detailed Solution:",
            numInputs: 2,
            placeholder1: "Type question here...",
            placeholder2: "Type detailed solution/note here...",
            onConfirm: function(qText, qSol) {
                if(!qText) { alert("Question content cannot be empty."); return; }
                saveTextMistakeToDB(targetChapter, qText, qSol);
            }
        });
    }

    function promptForCaptionAndSave(imageBlob, targetChapter) {
        showCustomModal({
            title: "Add Caption",
            desc: "Enter a question caption/note (Optional):",
            numInputs: 1, placeholder1: "e.g., Q.14 Calculation Error",
            onConfirm: function(customCaption) {
                const reader = new FileReader();
                reader.readAsDataURL(imageBlob);
                reader.onloadend = function() {
                    saveMistakeToDB(reader.result, targetChapter, customCaption);
                }
            }
        });
    }

    function saveMistakeToDB(base64Image, targetChapter, customCaption) {
        const transaction = db.transaction(["mistakes"], "readwrite");
        const store = transaction.objectStore("mistakes");
        
        store.getAll().onsuccess = function(e) {
            const totalInChapter = e.target.result.filter(item => 
                item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === targetChapter
            ).length;
            const nextIndex = totalInChapter + 1;
            const finalTitle = customCaption ? customCaption : `Question ${nextIndex}`;
            const currentDate = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});

            const newItem = {
                mainTab: CURRENT_MAIN_PAGE, subjectTab: currentSubjectTab, chapterName: targetChapter,
                questionIndex: nextIndex, questionTitle: finalTitle, dateAdded: currentDate, image: base64Image, 
                isPinned: false, contentType: "media"
            };
            
            store.add(newItem);
        };

        transaction.oncomplete = function() {
            if(currentSelectedChapter === targetChapter) renderMistakes();
        };
    }

    function saveTextMistakeToDB(targetChapter, textContent, solutionContent) {
        const transaction = db.transaction(["mistakes"], "readwrite");
        const store = transaction.objectStore("mistakes");
        
        store.getAll().onsuccess = function(e) {
            const totalInChapter = e.target.result.filter(item => 
                item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === targetChapter
            ).length;
            const nextIndex = totalInChapter + 1;
            const currentDate = new Date().toLocaleDateString('en-IN', {day: '2-digit', month: '2-digit', year: 'numeric'});

            const newItem = {
                mainTab: CURRENT_MAIN_PAGE, subjectTab: currentSubjectTab, chapterName: targetChapter,
                questionIndex: nextIndex, questionTitle: textContent.substring(0, 30) + "...", dateAdded: currentDate,
                isPinned: false, contentType: "text", textBody: textContent, solutionBody: solutionContent || "No custom solution provided."
            };
            store.add(newItem);
        };

        transaction.oncomplete = function() {
            if(currentSelectedChapter === targetChapter) renderMistakes();
        };
    }

    function toggleDropdown(e, id) {
        e.stopPropagation();
        document.querySelectorAll('.dropdown-menu-list').forEach(m => { if(m.id !== 'menu-' + id) m.style.display = 'none'; });
        const targetMenu = document.getElementById('menu-' + id);
        targetMenu.style.display = targetMenu.style.display === 'block' ? 'none' : 'block';
    }

    function deleteQuestion(id) {
        showCustomModal({
            title: "Confirm Deletion", desc: "Permanently delete this logged question?", numInputs: 0, confirmClass: "modal-btn-danger", confirmText: "Delete",
            onConfirm: function() {
                db.transaction(["mistakes"], "readwrite").objectStore("mistakes").delete(id).onsuccess = function() {
                    renderMistakes();
                };
            }
        });
    }

    function editQuestionCaption(id, currentText, type) {
        if(type === 'text') {
            const transaction = db.transaction(["mistakes"], "readwrite");
            const store = transaction.objectStore("mistakes");
            store.get(id).onsuccess = function(e) {
                const data = e.target.result;
                showCustomModal({
                    title: "Edit Written Question", desc: "Modify data content parameters:", numInputs: 2,
                    val1: data.textBody, placeholder1: "Question text body",
                    val2: data.solutionBody, placeholder2: "Solution body",
                    onConfirm: function(newBody, newSol) {
                        if(!newBody) return;
                        data.textBody = newBody;
                        data.solutionBody = newSol || "No custom solution provided.";
                        data.questionTitle = newBody.substring(0, 30) + "...";
                        const saveTrans = db.transaction(["mistakes"], "readwrite");
                        saveTrans.objectStore("mistakes").put(data).onsuccess = function() { renderMistakes(); };
                    }
                });
            };
        } else {
            showCustomModal({
                title: "Update Caption", desc: "Modify description note:", numInputs: 1, val1: currentText,
                onConfirm: function(newCaption) {
                    const transaction = db.transaction(["mistakes"], "readwrite");
                    const store = transaction.objectStore("mistakes");
                    store.get(id).onsuccess = function(e) {
                        const data = e.target.result;
                        data.questionTitle = newCaption ? newCaption : `Question ${data.questionIndex}`;
                        store.put(data).onsuccess = function() { renderMistakes(); };
                    };
                }
            });
        }
    }

    function togglePinQuestion(id) {
        const transaction = db.transaction(["mistakes"], "readwrite");
        const store = transaction.objectStore("mistakes");
        store.get(id).onsuccess = function(e) {
            const data = e.target.result;
            data.isPinned = !data.isPinned;
            store.put(data).onsuccess = function() { renderMistakes(); };
        };
    }

    function toggleSolutionCollapse(id) {
        const solBox = document.getElementById(`sol-box-${id}`);
        const btn = document.getElementById(`sol-btn-${id}`);
        if(solBox.style.display === 'block') {
            solBox.style.display = 'none';
            btn.innerText = "👁️ Show Solution";
        } else {
            solBox.style.display = 'block';
            btn.innerText = "🙈 Hide Solution";
        }
    }

    function openFullscreen(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
    function closeFullscreen() { document.getElementById('lightbox').style.display = 'none'; }

    async function openCamera() {
        document.getElementById('camera-modal').style.display = 'flex';
        try { streamRef = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false }); document.getElementById('video').srcObject = streamRef; }
        catch (err) { alert("Camera capture failed."); closeCamera(); }
    }
    function closeCamera() { document.getElementById('camera-modal').style.display = 'none'; if(streamRef) streamRef.getTracks().forEach(t => t.stop()); }
    function captureSnapshot() {
        const video = document.getElementById('video'); const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => { closeCamera(); handlePhotoIngestion(blob); }, 'image/jpeg', 0.85);
    }

    function renderMistakes() {
        const container = document.getElementById('mistakes-container');
        container.innerHTML = '';
        if (!db || currentSelectedChapter === 'NONE') return;

        db.transaction(["mistakes"], "readonly").objectStore("mistakes").getAll().onsuccess = function(e) {
            let filtered = e.target.result.filter(item => 
                item.mainTab === CURRENT_MAIN_PAGE && item.subjectTab === currentSubjectTab && item.chapterName === currentSelectedChapter
            );
            if(filtered.length === 0) {
                container.innerHTML = `<p style="color: #94a3b8; text-align: center; padding: 40px 0; font-size:0.9rem;">No questions found.</p>`;
                return;
            }
            filtered.sort((a, b) => (b.isPinned || 0) - (a.isPinned || 0));
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `mistake-card-row ${item.isPinned ? 'pinned' : ''}`;
                
                let dynamicContentHTML = '';
                if(item.contentType === "text") {
                    dynamicContentHTML = `
                        <div class="text-question-container"><b>Q:</b> ${item.textBody}</div>
                        <button class="sol-toggle-btn" id="sol-btn-${item.id}" onclick="toggleSolutionCollapse(${item.id})">👁️ Show Solution</button>
                        <div class="text-solution-box" id="sol-box-${item.id}"><b>Solution:</b> ${item.solutionBody}</div>
                    `;
                } else {
                    dynamicContentHTML = `
                        <div class="img-container-box" onclick="openFullscreen('${item.image}')">
                            <img src="${item.image}" alt="Question Image">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="mistake-meta">
                        <div class="mistake-index">${item.isPinned ? '📌' : '#'} Q.${item.questionIndex}</div>
                        <div class="mistake-caption" title="${item.questionTitle}">${item.questionTitle}</div>
                        <div class="mistake-date">${item.dateAdded}</div>
                    </div>
                    <button class="menu-action-trigger" onclick="toggleDropdown(event, ${item.id})">⋮</button>
                    <div class="dropdown-menu-list" id="menu-${item.id}">
                        <button onclick="togglePinQuestion(${item.id})">${item.isPinned ? '📍 Unpin' : '📌 Pin Card'}</button>
                        <button onclick="editQuestionCaption(${item.id}, '${item.questionTitle}', '${item.contentType || 'media'}')">✏️ Edit</button>
                        <button class="del-action" onclick="deleteQuestion(${item.id})">🗑️ Delete</button>
                    </div>
                    ${dynamicContentHTML}
                `;
                container.appendChild(card);
            });
        };
    }
</script>
</body>
</html>
